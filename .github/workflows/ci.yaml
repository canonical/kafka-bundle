name: Tests

on:
  workflow_dispatch:
    inputs:
      kafka-channel:
        description: "Channel to use for the Kafka charm (broker and controller)"
        default: "4/edge"
        required: false
        type: choice
        options:
          - "4/edge"
          - "4/candidate"
          - "4/stable"
  pull_request:
  workflow_call:
    inputs:
      kafka-channel:
        description: "Channel to use for the Kafka charm (broker and controller)"
        default: "4/edge"
        required: false
        type: string
  schedule:
    - cron: "53 0 * * *" # Daily at 00:53 UTC

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install tox
        run: pipx install tox
      - name: Run linters
        run: tox run -e lint

  integration-test-terraform:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        tox-environment:
          - integration-terraform
        kraft-mode:
          - single
          - multi
        juju:
          - snap_channel: "3.6/stable"
            agent: "3.6.10"
    runs-on: [self-hosted, linux, AMD64, X64, xlarge, noble]
    name: ${{ matrix.tox-environment }}_${{ matrix.kraft-mode }}_${{ matrix.juju.agent || matrix.juju.snap_channel }}
    needs:
      - lint
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup operator environment
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: ${{ matrix.juju.snap_channel }}
          bootstrap-options: "--agent-version ${{ matrix.juju.agent }}"
      - name: Install terraform snap
        run: |
          sudo snap install terraform --channel=latest/stable --classic
      - name: Select tests
        id: select-tests
        run: |
          # TODO: remove after LXD image issue is fixed (exists as of 2025-12-12):
          # https://bugs.launchpad.net/snapd/+bug/2127244
          lxc image copy ubuntu:568f69ff1166 local:
          sudo lxc image alias create "juju/ubuntu@22.04/amd64" 568f69ff1166

          if [ "${{ github.event_name }}" == "schedule" ]
          then
            echo Running unstable and stable tests
            echo "mark_expression=" >> $GITHUB_OUTPUT
          else
            echo Skipping unstable tests
            echo "mark_expression=not unstable" >> $GITHUB_OUTPUT
          fi
      - name: Run integration tests
        run: |
          tox run -e ${{ matrix.tox-environment }} -- -m '${{ steps.select-tests.outputs.mark_expression }}' --keep-models --kraft-mode=${{ matrix.kraft-mode }} --kafka-channel=${{ inputs.kafka-channel || '4/edge' }}
